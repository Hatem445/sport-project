# FitLife AI - Configuration File

# ==================== Server Settings ====================
[SERVER]
HOST = 0.0.0.0
PORT = 5000
DEBUG = True
THREADS = 4

# ==================== Database ====================
[DATABASE]
TYPE = sqlite
LOCATION = fitness_ai.db
POOL_SIZE = 10
MAX_OVERFLOW = 20

# ==================== Security ====================
[SECURITY]
SECRET_KEY = change-this-in-production
SESSION_TIMEOUT = 3600
PASSWORD_MIN_LENGTH = 8
HTTPS_REQUIRED = False  # Set to True in production

# ==================== SMS Configuration ====================
[SMS]
PROVIDER = twilio  # Options: twilio, aws_sns, nexmo, mock
ENABLED = True
API_KEY = YOUR_API_KEY_HERE
ACCOUNT_SID = YOUR_ACCOUNT_SID_HERE
AUTH_TOKEN = YOUR_AUTH_TOKEN_HERE
FROM_NUMBER = +1234567890

# ==================== Email Configuration ====================
[EMAIL]
ENABLED = True
PROVIDER = smtp  # Options: smtp, sendgrid, ses
SMTP_SERVER = smtp.gmail.com
SMTP_PORT = 587
SENDER_EMAIL = noreply@fitlife.ai
SENDER_PASSWORD = YOUR_PASSWORD_HERE

# ==================== Logging ====================
[LOGGING]
LEVEL = INFO  # DEBUG, INFO, WARNING, ERROR, CRITICAL
FORMAT = %(asctime)s - %(name)s - %(levelname)s - %(message)s
FILE = logs/app.log
MAX_SIZE = 10485760  # 10MB
BACKUP_COUNT = 5

# ==================== AI Settings ====================
[AI]
ENABLED = True
MODEL = FitnessAIModel
ANALYSIS_THRESHOLD = 0.7
AUTO_ANALYSIS = True
ANALYSIS_FREQUENCY = daily  # daily, weekly, on_demand

# ==================== Health Monitoring ====================
[HEALTH_MONITORING]
ENABLED = True
ALERT_ON_ABNORMAL = True
HEART_RATE_WARNING = 120
BLOOD_PRESSURE_ALERT = 180/120
STRESS_LEVEL_WARNING = 8
SLEEP_WARNING_HOURS = 6

# ==================== Notifications ====================
[NOTIFICATIONS]
ENABLED = True
SMS_ENABLED = True
EMAIL_ENABLED = True
PUSH_ENABLED = False
DIGEST_FREQUENCY = daily  # daily, weekly, none

# ==================== Backup Settings ====================
[BACKUP]
ENABLED = True
FREQUENCY = daily  # daily, weekly, monthly
LOCATION = backups/
RETENTION_DAYS = 30
AUTO_CLEANUP = True

# ==================== Performance ====================
[PERFORMANCE]
CACHE_ENABLED = True
CACHE_TYPE = simple  # simple, redis, memcache
CACHE_TIMEOUT = 300
COMPRESSION_ENABLED = True
COMPRESSION_LEVEL = 6

# ==================== API Settings ====================
[API]
RATE_LIMIT_ENABLED = True
RATE_LIMIT_PER_HOUR = 100
API_VERSION = v1
CORS_ENABLED = True

# ==================== File Upload ====================
[FILES]
MAX_UPLOAD_SIZE = 5242880  # 5MB
ALLOWED_EXTENSIONS = ['.jpg', '.jpeg', '.png', '.pdf']
UPLOAD_FOLDER = uploads/

# ==================== Features ====================
[FEATURES]
USER_REGISTRATION = True
SOCIAL_LOGIN = False
GOOGLE_LOGIN = False
FACEBOOK_LOGIN = False
TWO_FACTOR_AUTH = False

# ==================== Third Party APIs ====================
[EXTERNAL_APIS]
GOOGLE_ANALYTICS = False
GOOGLE_ANALYTICS_ID = 
FACEBOOK_PIXEL = False
FACEBOOK_PIXEL_ID = 

# ==================== Medical Data ====================
[MEDICAL_REFERENCES]
DEFAULT_COUNTRY = SA
LANGUAGE = ar
USE_INTERNATIONAL_STANDARDS = True

# الأمراض والحالات المشمولة
[HEALTH_CONDITIONS]
HYPERTENSION = enabled
DIABETES = enabled
ARTHRITIS = enabled
ASTHMA = enabled
HEART_DISEASE = enabled
OBESITY = enabled
DEPRESSION = enabled

# ==================== Exercise Categories ====================
[EXERCISE_TYPES]
CARDIO = enabled
STRENGTH = enabled
FLEXIBILITY = enabled
BALANCE = enabled
SPORTS = enabled
YOGA = enabled
PILATES = enabled
SWIMMING = enabled
CYCLING = enabled
WALKING = enabled

# ==================== Muscle Groups ====================
[MUSCLE_GROUPS]
CHEST = enabled
BACK = enabled
SHOULDERS = enabled
BICEPS = enabled
TRICEPS = enabled
FOREARMS = enabled
CORE = enabled
QUADRICEPS = enabled
HAMSTRINGS = enabled
GLUTES = enabled
CALVES = enabled

# ==================== Development ====================
[DEVELOPMENT]
TESTING = False
DEBUG_TOOLBAR = False
PROFILER = False
VERBOSE_LOGGING = False

# ==================== Maintenance ====================
[MAINTENANCE]
MAINTENANCE_MODE = False
MAINTENANCE_MESSAGE = تم إغلاق الموقع لأعمال الصيانة. سنعود قريباً.
SCHEDULED_MAINTENANCE_TIME = 02:00  # UTC

# ==================== Data Collection ====================
[DATA_COLLECTION]
ANALYTICS_ENABLED = True
ERROR_LOGGING = True
PERFORMANCE_MONITORING = True
USER_BEHAVIOR_TRACKING = False

# ==================== Default Settings ====================
[DEFAULTS]
TIMEZONE = Asia/Riyadh
LANGUAGE = ar
DATE_FORMAT = YYYY-MM-DD
TIME_FORMAT = HH:MM:SS
CURRENCY = SAR

# ==================== Limits ====================
[LIMITS]
MAX_EXERCISES_PER_DAY = 10
MAX_HEALTH_RECORDS_PER_DAY = 5
MAX_RECOMMENDATIONS_TO_SHOW = 10
MAX_MONTHLY_API_CALLS = 10000
SESSION_MAX_AGE = 86400  # 24 hours

# ==================== Customization ====================
[CUSTOMIZATION]
APP_NAME = FitLife AI
COMPANY_NAME = FitLife
WEBSITE_URL = https://fitlife.ai
SUPPORT_EMAIL = support@fitlife.ai
FEEDBACK_EMAIL = feedback@fitlife.ai

# ==================== Legal ====================
[LEGAL]
TERMS_URL = https://fitlife.ai/terms
PRIVACY_URL = https://fitlife.ai/privacy
DISCLAIMER = يرجى استشارة طبيب قبل بدء أي برنامج تدريب
MEDICAL_DISCLAIMER = هذا التطبيق ليس بديلاً عن الاستشارة الطبية المتخصصة
