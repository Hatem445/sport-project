{% extends "base.html" %}

{% block title %}تسجيل الدخول - FitLife AI{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-logo">
                <i class="fas fa-heartbeat"></i>
            </div>
            <h1>FitLife AI</h1>
            <p>برنامج اللياقة والصحة الذكي</p>
        </div>
        
        <form id="login-form" class="auth-form">
            <div class="form-group">
                <label for="username">اسم المستخدم</label>
                <input type="text" id="username" placeholder="أدخل اسم المستخدم" required>
            </div>
            
            <div class="form-group">
                <label for="password">كلمة السر</label>
                <input type="password" id="password" placeholder="أدخل كلمة السر" required>
            </div>
            
            <div class="form-remember">
                <input type="checkbox" id="remember" checked>
                <label for="remember">تذكرني</label>
            </div>
            
            <button type="submit" class="btn btn-primary btn-large">
                <i class="fas fa-sign-in-alt"></i> تسجيل الدخول
            </button>
        </form>
        
        <div class="auth-footer">
            <p>ليس لديك حساب؟ <a href="{{ url_for('register') }}">إنشاء حساب جديد</a></p>
            <a href="#" class="forgot-password">هل نسيت كلمة السر؟</a>
        </div>
    </div>
</div>

{% endblock %}

{% block scripts %}
<script>
document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const formData = {
        username: document.getElementById('username').value,
        password: document.getElementById('password').value
    };
    
    try {
        const response = await fetch('/login', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(formData)
        });
        
        const data = await response.json();
        
        if (response.ok) {
            showToast('✅ تم تسجيل الدخول بنجاح!', 'success');
            setTimeout(() => {
                window.location.href = '/';
            }, 1500);
        } else {
            showToast('❌ ' + (data.error || 'فشل تسجيل الدخول'), 'error');
        }
    } catch (error) {
        showToast('❌ حدث خطأ: ' + error.message, 'error');
    }
});

function showToast(message, type) {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.className = 'toast show ' + type;
    setTimeout(() => {
        toast.className = 'toast';
    }, 3000);
}
</script>
{% endblock %}
